<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="chalkboard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d4a3e"/>
      <stop offset="100%" style="stop-color:#1a3329"/>
    </linearGradient>
  </defs>

  <!-- Background - office/classroom -->
  <rect width="400" height="300" fill="#FDF0EE"/>

  <!-- Chalkboard -->
  <rect x="120" y="20" width="260" height="160" fill="url(#chalkboard)" stroke="#8B6852" stroke-width="8"/>

  <!-- Math equations on chalkboard -->
  <g fill="white" font-family="serif" opacity="0.9">
    <text x="140" y="55" font-size="14">trajectory = v₀t + ½at²</text>
    <text x="250" y="85" font-size="12">Δv = √(2μ/r)</text>
    <text x="145" y="110" font-size="16">∫ F·dr = ΔKE</text>
    <text x="280" y="130" font-size="11">orbital mechanics</text>
    <text x="160" y="155" font-size="13">r = a(1-e²)/(1+e·cosθ)</text>
  </g>

  <!-- NASA logo hint -->
  <circle cx="350" cy="50" r="18" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
  <text x="340" y="55" font-size="10" fill="white" opacity="0.5">NASA</text>

  <!-- Katherine Johnson -->
  <g transform="translate(80, 120)">
    <!-- Body/dress -->
    <path d="M0,50 Q-25,90 -30,140 L30,140 Q25,90 0,50" fill="#6B4D8E"/>
    <!-- Collar -->
    <path d="M-12,50 L0,60 L12,50" fill="white"/>
    <!-- Head -->
    <circle cx="0" cy="30" r="28" fill="#8B6852"/>
    <!-- Hair - short curled style -->
    <path d="M-25,20 Q-30,-5 -10,-18 Q0,-22 10,-18 Q30,-5 25,20 Q20,12 0,15 Q-20,12 -25,20" fill="#2a1810"/>
    <!-- Glasses -->
    <ellipse cx="-10" cy="28" rx="10" ry="8" fill="none" stroke="#4A3728" stroke-width="2"/>
    <ellipse cx="10" cy="28" rx="10" ry="8" fill="none" stroke="#4A3728" stroke-width="2"/>
    <line x1="0" y1="28" x2="0" y2="28" stroke="#4A3728" stroke-width="2"/>
    <line x1="-20" y1="28" x2="-25" y2="25" stroke="#4A3728" stroke-width="2"/>
    <line x1="20" y1="28" x2="25" y2="25" stroke="#4A3728" stroke-width="2"/>
    <!-- Eyes behind glasses -->
    <circle cx="-10" cy="28" r="2" fill="#2a1810"/>
    <circle cx="10" cy="28" r="2" fill="#2a1810"/>
    <!-- Confident smile -->
    <path d="M-8,42 Q0,48 8,42" stroke="#2a1810" stroke-width="2" fill="none"/>
    <!-- Arm pointing at board -->
    <path d="M25,70 Q60,50 100,40" stroke="#8B6852" stroke-width="8" fill="none"/>
    <circle cx="100" cy="40" r="6" fill="#8B6852"/>
    <!-- Chalk in hand -->
    <rect x="96" y="35" width="15" height="4" fill="white" transform="rotate(20, 100, 40)"/>
  </g>

  <!-- Desk with papers -->
  <rect x="200" y="220" width="180" height="60" fill="#8B6852"/>
  <rect x="220" y="210" width="40" height="30" fill="white" transform="rotate(-5)"/>
  <rect x="280" y="205" width="40" height="30" fill="white" transform="rotate(3)"/>
  <rect x="340" y="208" width="30" height="25" fill="#FDF0EE"/>

  <!-- Pencils -->
  <rect x="330" y="200" width="4" height="30" fill="#E8B44C"/>
  <polygon points="330,200 334,200 332,192" fill="#DEB887"/>

  <!-- Sparkle of brilliance -->
  <text x="60" y="60" font-size="24" fill="#E8B44C">✨</text>
</svg>
