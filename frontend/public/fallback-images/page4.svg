<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="space" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a20"/>
      <stop offset="50%" style="stop-color:#1a1a40"/>
      <stop offset="100%" style="stop-color:#2a2a60"/>
    </linearGradient>
    <linearGradient id="rocket" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0"/>
      <stop offset="100%" style="stop-color:#d0d0d0"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8B44C"/>
      <stop offset="50%" style="stop-color:#E07A6A"/>
      <stop offset="100%" style="stop-color:#C4594B"/>
    </linearGradient>
  </defs>

  <!-- Space background -->
  <rect width="400" height="300" fill="url(#space)"/>

  <!-- Stars -->
  <g fill="#E8B44C">
    <text x="20" y="30" font-size="8">★</text>
    <text x="80" y="60" font-size="12">★</text>
    <text x="150" y="25" font-size="6">★</text>
    <text x="200" y="50" font-size="10">★</text>
    <text x="300" y="35" font-size="8">★</text>
    <text x="350" y="70" font-size="14">★</text>
    <text x="380" y="30" font-size="6">★</text>
    <text x="50" y="120" font-size="10">★</text>
    <text x="320" y="150" font-size="8">★</text>
    <text x="370" y="200" font-size="12">★</text>
    <text x="30" y="250" font-size="6">★</text>
    <text x="100" y="280" font-size="8">★</text>
  </g>

  <!-- Moon -->
  <circle cx="320" cy="80" r="45" fill="#FFFACD"/>
  <circle cx="305" cy="70" r="8" fill="#E8E8D0" opacity="0.5"/>
  <circle cx="335" cy="90" r="12" fill="#E8E8D0" opacity="0.4"/>
  <circle cx="310" cy="100" r="6" fill="#E8E8D0" opacity="0.3"/>

  <!-- Earth (partial) -->
  <circle cx="50" cy="320" r="80" fill="#5EA8CC"/>
  <ellipse cx="30" cy="310" rx="30" ry="20" fill="#6DAA73" opacity="0.7"/>
  <ellipse cx="80" cy="290" rx="20" ry="15" fill="#6DAA73" opacity="0.6"/>

  <!-- Rocket -->
  <g transform="translate(180, 100) rotate(-25)">
    <!-- Main body -->
    <ellipse cx="0" cy="0" rx="25" ry="70" fill="url(#rocket)"/>
    <!-- Nose cone -->
    <path d="M-25,0 Q-20,-40 0,-80 Q20,-40 25,0" fill="#C4594B"/>
    <!-- Window -->
    <circle cx="0" cy="-20" r="12" fill="#1a1a40" stroke="#5EA8CC" stroke-width="3"/>
    <circle cx="-3" cy="-23" r="3" fill="white" opacity="0.5"/>
    <!-- Fins -->
    <path d="M-25,40 L-45,80 L-25,70" fill="#C4594B"/>
    <path d="M25,40 L45,80 L25,70" fill="#C4594B"/>
    <!-- USA marking -->
    <text x="-12" y="20" font-size="10" fill="#1a1a40" font-weight="bold">USA</text>
    <!-- Flame -->
    <path d="M-20,70 Q0,140 20,70 Q10,110 0,130 Q-10,110 -20,70" fill="url(#flame)"/>
    <path d="M-12,70 Q0,120 12,70 Q5,100 0,110 Q-5,100 -12,70" fill="#E8B44C"/>
  </g>

  <!-- Floating equations around rocket -->
  <g fill="#E8B44C" opacity="0.6" font-family="serif" font-size="10">
    <text x="90" y="80">Δv=√(2μ/r)</text>
    <text x="260" y="180">F=ma</text>
    <text x="80" y="200">v²/r</text>
    <text x="280" y="240">∫F·dt</text>
  </g>

  <!-- Trajectory arc (dotted) -->
  <path d="M180,180 Q250,100 320,80" fill="none" stroke="#E8B44C" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
</svg>
