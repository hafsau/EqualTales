<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="nightsky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#2d2d5a"/>
    </linearGradient>
    <linearGradient id="warmlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF7E6"/>
      <stop offset="100%" style="stop-color:#FDF0EE"/>
    </linearGradient>
  </defs>

  <!-- Room interior -->
  <rect width="400" height="300" fill="url(#warmlight)"/>

  <!-- Window showing night sky -->
  <rect x="220" y="40" width="140" height="180" fill="url(#nightsky)" stroke="#8B6852" stroke-width="8"/>
  <line x1="290" y1="40" x2="290" y2="220" stroke="#8B6852" stroke-width="4"/>
  <line x1="220" y1="130" x2="360" y2="130" stroke="#8B6852" stroke-width="4"/>

  <!-- Stars in window -->
  <text x="240" y="80" font-size="12" fill="#E8B44C">★</text>
  <text x="320" y="100" font-size="16" fill="#E8B44C">★</text>
  <text x="260" y="110" font-size="10" fill="#E8B44C">★</text>
  <text x="340" y="70" font-size="14" fill="#E8B44C">★</text>
  <text x="250" y="160" font-size="12" fill="#E8B44C">★</text>
  <text x="310" y="180" font-size="18" fill="#E8B44C">★</text>
  <text x="335" y="150" font-size="10" fill="#E8B44C">★</text>

  <!-- Moon -->
  <circle cx="270" cy="90" r="20" fill="#FFFACD"/>

  <!-- Curtains -->
  <path d="M215,35 Q200,130 215,225" fill="#8B6DB5" opacity="0.7"/>
  <path d="M365,35 Q380,130 365,225" fill="#8B6DB5" opacity="0.7"/>

  <!-- Couch/seat -->
  <rect x="40" y="200" width="160" height="60" rx="10" fill="#C4594B"/>
  <rect x="30" y="180" width="180" height="30" rx="8" fill="#E07A6A"/>

  <!-- Mother sitting -->
  <g transform="translate(80, 140)">
    <!-- Body -->
    <path d="M0,40 Q-20,60 -25,100 L25,100 Q20,60 0,40" fill="#6B4D8E"/>
    <!-- Head -->
    <circle cx="0" cy="20" r="22" fill="#DEB887"/>
    <!-- Hair -->
    <path d="M-20,10 Q-25,-10 0,-18 Q25,-10 20,10 Q15,0 0,5 Q-15,0 -20,10" fill="#4A3728"/>
    <path d="M-18,15 Q-25,30 -20,50" stroke="#4A3728" stroke-width="5" fill="none"/>
    <path d="M18,15 Q25,30 20,50" stroke="#4A3728" stroke-width="5" fill="none"/>
    <!-- Warm smile -->
    <circle cx="-6" cy="18" r="2" fill="#4A3728"/>
    <circle cx="6" cy="18" r="2" fill="#4A3728"/>
    <path d="M-6,28 Q0,34 6,28" stroke="#4A3728" stroke-width="2" fill="none"/>
    <!-- Arm reaching out -->
    <path d="M20,50 Q40,60 55,50" stroke="#DEB887" stroke-width="10" fill="none"/>
  </g>

  <!-- Lily sitting next to mom -->
  <g transform="translate(150, 160)">
    <!-- Body -->
    <path d="M0,35 Q-12,55 -15,80 L15,80 Q12,55 0,35" fill="#E07A6A"/>
    <!-- Head -->
    <circle cx="0" cy="18" r="18" fill="#DEB887"/>
    <!-- Hair -->
    <path d="M-15,10 Q-18,-5 0,-12 Q18,-5 15,10 Q10,5 0,8 Q-10,5 -15,10" fill="#4A3728"/>
    <path d="M-12,15 Q-15,28 -13,40" stroke="#4A3728" stroke-width="3" fill="none"/>
    <path d="M12,15 Q15,28 13,40" stroke="#4A3728" stroke-width="3" fill="none"/>
    <!-- Curious/sad face -->
    <circle cx="-5" cy="16" r="2" fill="#4A3728"/>
    <circle cx="5" cy="16" r="2" fill="#4A3728"/>
    <ellipse cx="0" cy="26" rx="4" ry="2" fill="#4A3728"/>
  </g>

  <!-- Warm lamp glow -->
  <circle cx="50" cy="100" r="40" fill="#E8B44C" opacity="0.15"/>
</svg>
