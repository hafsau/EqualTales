# ============================================================
# EqualTales — Goose Configuration
# ============================================================
# Copy this into your ~/.config/goose/config.yaml
# or merge with your existing config.
#
# Before running:
# 1. pip install fastmcp anthropic openai python-dotenv
# 2. Set environment variables:
#    export OPENROUTER_API_KEY=your_key_here
#    export OPENAI_API_KEY=your_key_here
# 3. Update the path below to your actual project location
# ============================================================

extensions:
  equaltales:
    name: "EqualTales — Anti-Stereotype Story Engine"
    type: stdio
    cmd: python
    args: [/Users/hafsa/EqualTales/mcp_server/server.py]
    env:
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
    timeout: 300
    enabled: true
